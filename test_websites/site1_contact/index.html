<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - AutoTestAI</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Contact Us</h1>
        <p>Fill out the form below to send us a message.</p>

        <form id="contactForm" novalidate>
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name"
                       required minlength="2" maxlength="50">
                <div class="error-msg" id="name-error"></div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com"
                       required>
                <div class="error-msg" id="email-error"></div>
            </div>

            <div class="form-group">
                <label for="subject">Subject</label>
                <select id="subject" name="subject" required>
                    <option value="">-- Select a subject --</option>
                    <option value="general">General Inquiry</option>
                    <option value="support">Technical Support</option>
                    <option value="billing">Billing Question</option>
                    <option value="feedback">Feedback</option>
                </select>
                <div class="error-msg" id="subject-error"></div>
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5"
                          placeholder="Type your message here (10-500 characters)"
                          required minlength="10" maxlength="500"></textarea>
                <div class="error-msg" id="message-error"></div>
            </div>

            <button type="submit" id="submitBtn">Send Message</button>
        </form>
    </div>

    <script src="js/validate.js"></script>
</body>
</html>
