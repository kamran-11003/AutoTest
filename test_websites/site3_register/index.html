<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — Site 3</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Create an Account</h1>
        <p>Fill in the details below to register.</p>

        <form id="registerForm" novalidate>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="e.g. john_doe99">
                <div class="error-msg" id="usernameError"></div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="text" id="email" name="email" placeholder="you@example.com">
                <div class="error-msg" id="emailError"></div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Minimum 8 characters">
                <div class="error-msg" id="passwordError"></div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter password">
                <div class="error-msg" id="confirmPasswordError"></div>
            </div>

            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" name="age" placeholder="18 – 120">
                <div class="error-msg" id="ageError"></div>
            </div>

            <button type="submit">Register</button>
        </form>

        <div id="successBanner" class="success-banner" style="display:none;">
            <span class="checkmark">&#10004;</span>
            <span id="welcomeMsg"></span>
        </div>
    </div>

    <script src="js/validate.js"></script>
</body>
</html>
