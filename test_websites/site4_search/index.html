<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Search — Site 4</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Product Search</h1>
        <p>Find products by entering your search criteria below.</p>

        <form id="searchForm" novalidate>
            <div class="form-group">
                <label for="keywords">Keywords</label>
                <input type="text" id="keywords" name="keywords" placeholder="At least 2 characters">
                <div class="error-msg" id="keywordsError"></div>
            </div>

            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" name="category">
                    <option value="">-- Select a category --</option>
                    <option value="electronics">Electronics</option>
                    <option value="clothing">Clothing</option>
                    <option value="books">Books</option>
                    <option value="home">Home &amp; Garden</option>
                    <option value="sports">Sports</option>
                </select>
                <div class="error-msg" id="categoryError"></div>
            </div>

            <div class="form-group price-row">
                <div class="price-field">
                    <label for="minPrice">Min Price ($)</label>
                    <input type="number" id="minPrice" name="minPrice" placeholder="0" min="0">
                    <div class="error-msg" id="minPriceError"></div>
                </div>
                <div class="price-field">
                    <label for="maxPrice">Max Price ($)</label>
                    <input type="number" id="maxPrice" name="maxPrice" placeholder="10000" min="0">
                    <div class="error-msg" id="maxPriceError"></div>
                </div>
            </div>

            <button type="submit">Search Products</button>
        </form>

        <!-- Results section — hidden until valid search -->
        <section id="results" style="display:none;" aria-live="polite">
            <h2>Search Results</h2>
            <p class="result-meta" id="resultMeta"></p>
            <div class="product-grid">
                <div class="product-card">
                    <div class="product-img">&#128247;</div>
                    <h3>Demo Product A</h3>
                    <p>Category: <span id="r1Cat"></span></p>
                    <p class="price" id="r1Price"></p>
                </div>
                <div class="product-card">
                    <div class="product-img">&#128218;</div>
                    <h3>Demo Product B</h3>
                    <p>Category: <span id="r2Cat"></span></p>
                    <p class="price" id="r2Price"></p>
                </div>
                <div class="product-card">
                    <div class="product-img">&#127947;</div>
                    <h3>Demo Product C</h3>
                    <p>Category: <span id="r3Cat"></span></p>
                    <p class="price" id="r3Price"></p>
                </div>
            </div>
        </section>
    </div>

    <script src="js/validate.js"></script>
</body>
</html>
