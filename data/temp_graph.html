        <center>

        <style type="text/css">

             #mynetwork {
                 width: 100%;
                 height: 800px;
                 background-color: #ffffff;
                 border: 1px solid lightgray;
                 position: relative;
                 float: left;
             }

                 float: left;

    <body>
        <div class="card" style="width: 100%">
            
            
            <div id="mynetwork" class="card-body"></div>
        </div>

        
        
            <div id="config"></div>
        

        <script type="text/javascript">

              // initialize global variables.
              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;
              var container;
              var options, data;
              var filter = {
                  item : '',
                  property : '',
                  value : []
              };

              

              

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#4ECDC4", "font": {"color": "#000000"}, "id": "fb871217", "label": "home", "shape": "dot", "size": 25, "title": "\u003cb\u003eTest Server v2\u003c/b\u003e\u003cbr\u003eURL: http://127.0.0.1:5001\u003cbr\u003eForms: 0 | Inputs: 0"}, {"color": "#FF6B6B", "font": {"color": "#000000"}, "id": "93b50e53", "label": "login", "shape": "dot", "size": 25, "title": "\u003cb\u003eLogin\u003c/b\u003e\u003cbr\u003eURL: http://127.0.0.1:5001/login\u003cbr\u003eForms: 1 | Inputs: 2"}]);
                  edges = new vis.DataSet([{"arrows": "to", "color": "#888888", "from": "fb871217", "to": "93b50e53", "width": 1}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {
    "configure": {
        "enabled": true,
        "filter": [
            "physics"
        ]
    },
    "edges": {
        "color": {
            "inherit": true
        },
        "smooth": {
            "enabled": true,
            "type": "dynamic"
        }
    },
    "interaction": {
        "dragNodes": true,
        "hideEdgesOnDrag": false,
        "hideNodesOnDrag": false
    },
    "physics": {
        "enabled": true,
        "stabilization": {
            "enabled": true,
            "fit": true,
            "iterations": 1000,
            "onlyDynamicEdges": false,
            "updateInterval": 50
        }
    }
};

                  


                  
                  // if this network requires displaying the configure window,
                  // put it in its div
                  options.configure["container"] = document.getElementById("config");
                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
              drawGraph();
        </script>
    
<div id="node-details" style="margin-top:20px;padding:15px;background:#f8f9fa;border-radius:5px;display:none;"></div>
<script>
const nodes = {"fb871217": {"url": "http://127.0.0.1:5001", "title": "Test Server v2", "forms": 0, "inputs": 0, "buttons": 0, "links": 1}, "93b50e53": {"url": "http://127.0.0.1:5001/login", "title": "Login", "forms": 1, "inputs": 2, "buttons": 1, "links": 0}};
setTimeout(() => {
  if (typeof network !== 'undefined') {
    network.on("click", (params) => {
      if (params.nodes[0]) {
        const n = nodes[params.nodes[0]];
        document.getElementById('node-details').innerHTML = n ? `
          <b>📄 ${n.title}</b><br>
          <a href="${n.url}" target="_blank">${n.url}</a><br>
          Forms: ${n.forms} | Inputs: ${n.inputs} | Buttons: ${n.buttons} | Links: ${n.links}
        ` : 'No data';
        document.getElementById('node-details').style.display = 'block';
      }
    });
  }
}, 500);
</script>
