<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The QA Tester's Gauntlet - The Form Factory</title>
    <link rel="stylesheet" href="styles.css">
<style>
                    *, *::before, *::after {
                        animation-duration: 0.001s !important;
                        animation-delay: 0s !important;
                        transition-duration: 0.001s !important;
                        transition-delay: 0s !important;
                    }
                </style></head>
<body>
    <header class="sticky-header" id="main-header" data-testid="main-header">
        <div class="container">
            <h1 id="site-title" data-testid="site-title">The QA Tester's Gauntlet</h1>
            <nav id="main-nav" data-testid="main-nav">
                <a href="index.html" id="nav-dashboard" name="nav-dashboard" data-testid="nav-dashboard">Dashboard</a>
                <a href="forms.html" id="nav-forms" name="nav-forms" data-testid="nav-forms">The Form Factory</a>
                <a href="interactive.html" id="nav-interactive" name="nav-interactive" data-testid="nav-interactive">Dynamic Events</a>
                <a href="data-vault.html" id="nav-data" name="nav-data" data-testid="nav-data">The Data Vault</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="card" id="form-section" data-testid="form-section">
            <h2 id="form-heading" data-testid="form-heading">The Form Factory</h2>
            <p id="form-description" data-testid="form-description">Complete user profile setup with 15+ input types</p>

            <form id="user-profile-form" name="user-profile-form" data-testid="user-profile-form">
                <div class="form-group">
                    <label for="full-name" id="label-full-name" data-testid="label-full-name">Full Name</label>
                    <input type="text" id="full-name" name="full-name" data-testid="full-name" placeholder="Enter your full name" required="">
                </div>

                <div class="form-group">
                    <label for="username" id="label-username" data-testid="label-username">Username</label>
                    <input type="text" id="username" name="username" data-testid="username" placeholder="Choose a username" required="">
                </div>

                <div class="form-group">
                    <label for="email" id="label-email" data-testid="label-email">Email Address</label>
                    <input type="email" id="email" name="email" data-testid="email" placeholder="your.email@example.com" required="">
                </div>

                <div class="form-group">
                    <label for="password" id="label-password" data-testid="label-password">Password</label>
                    <input type="password" id="password" name="password" data-testid="password" placeholder="Create a strong password" required="">
                </div>

                <div class="form-group">
                    <label for="tel" id="label-tel" data-testid="label-tel">Phone Number</label>
                    <input type="tel" id="tel" name="tel" data-testid="tel" placeholder="+1-555-555-5555" pattern="[0-9+\-()]*">
                </div>

                <div class="form-group">
                    <label for="country" id="label-country" data-testid="label-country">Country</label>
                    <select id="country" name="country" data-testid="country" required="">
                        <option value="" id="country-default" data-testid="country-default">Select a country</option>
                        <option value="us" id="country-us" data-testid="country-us">United States</option>
                        <option value="uk" id="country-uk" data-testid="country-uk">United Kingdom</option>
                        <option value="ca" id="country-ca" data-testid="country-ca">Canada</option>
                        <option value="au" id="country-au" data-testid="country-au">Australia</option>
                        <option value="de" id="country-de" data-testid="country-de">Germany</option>
                        <option value="fr" id="country-fr" data-testid="country-fr">France</option>
                        <option value="jp" id="country-jp" data-testid="country-jp">Japan</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="timezone" id="label-timezone" data-testid="label-timezone">Timezone (Multi-select)</label>
                    <select id="timezone" name="timezone" data-testid="timezone" multiple="" size="4">
                        <option value="est" id="tz-est" data-testid="tz-est">EST (UTC-5)</option>
                        <option value="cst" id="tz-cst" data-testid="tz-cst">CST (UTC-6)</option>
                        <option value="mst" id="tz-mst" data-testid="tz-mst">MST (UTC-7)</option>
                        <option value="pst" id="tz-pst" data-testid="tz-pst">PST (UTC-8)</option>
                        <option value="gmt" id="tz-gmt" data-testid="tz-gmt">GMT (UTC+0)</option>
                        <option value="cet" id="tz-cet" data-testid="tz-cet">CET (UTC+1)</option>
                        <option value="jst" id="tz-jst" data-testid="tz-jst">JST (UTC+9)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label id="label-account-tier" data-testid="label-account-tier">Account Tier</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" id="tier-free" name="account-tier" data-testid="tier-free" value="free" required="">
                            <span id="tier-free-label" data-testid="tier-free-label">Free</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" id="tier-pro" name="account-tier" data-testid="tier-pro" value="pro">
                            <span id="tier-pro-label" data-testid="tier-pro-label">Pro</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" id="tier-enterprise" name="account-tier" data-testid="tier-enterprise" value="enterprise">
                            <span id="tier-enterprise-label" data-testid="tier-enterprise-label">Enterprise</span>
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label id="label-notifications" data-testid="label-notifications">Notification Preferences (Select at least 3)</label>
                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="notif-email" name="notifications" data-testid="notif-email" value="email">
                            <span id="notif-email-label" data-testid="notif-email-label">Email Notifications</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="notif-sms" name="notifications" data-testid="notif-sms" value="sms">
                            <span id="notif-sms-label" data-testid="notif-sms-label">SMS Alerts</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="notif-push" name="notifications" data-testid="notif-push" value="push">
                            <span id="notif-push-label" data-testid="notif-push-label">Push Notifications</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="notif-slack" name="notifications" data-testid="notif-slack" value="slack">
                            <span id="notif-slack-label" data-testid="notif-slack-label">Slack Integration</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="notif-webhook" name="notifications" data-testid="notif-webhook" value="webhook">
                            <span id="notif-webhook-label" data-testid="notif-webhook-label">Webhook Events</span>
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="experience-level" id="label-experience" data-testid="label-experience">Experience Level: <span id="experience-value" data-testid="experience-value">50</span></label>
                    <input type="range" id="experience-level" name="experience-level" data-testid="experience-level" min="0" max="100" value="50" step="5">
                </div>

                <div class="form-group">
                    <label for="favorite-color" id="label-color" data-testid="label-color">Favorite Color</label>
                    <input type="color" id="favorite-color" name="favorite-color" data-testid="favorite-color" value="#3b82f6">
                </div>

                <div class="form-group">
                    <label for="birth-date" id="label-birth-date" data-testid="label-birth-date">Date of Birth</label>
                    <input type="date" id="birth-date" name="birth-date" data-testid="birth-date">
                </div>

                <div class="form-group">
                    <label for="start-time" id="label-start-time" data-testid="label-start-time">Preferred Start Time</label>
                    <input type="time" id="start-time" name="start-time" data-testid="start-time">
                </div>

                <div class="form-group">
                    <label for="profile-picture" id="label-file" data-testid="label-file">Profile Picture</label>
                    <input type="file" id="profile-picture" name="profile-picture" data-testid="profile-picture" accept="image/*">
                </div>

                <div class="form-group">
                    <label for="bio" id="label-bio" data-testid="label-bio">Bio (200 characters max)</label>
                    <textarea id="bio" name="bio" data-testid="bio" placeholder="Tell us about yourself..." maxlength="200" rows="4"></textarea>
                    <div class="character-counter">
                        <span id="char-count" data-testid="char-count">0</span> / 200 characters
                    </div>
                </div>

                <div class="form-group">
                    <label for="website" id="label-website" data-testid="label-website">Website URL</label>
                    <input type="url" id="website" name="website" data-testid="website" placeholder="https://example.com">
                </div>

                <div class="form-group">
                    <label for="api-key" id="label-api-key" data-testid="label-api-key">API Key (Number)</label>
                    <input type="number" id="api-key" name="api-key" data-testid="api-key" placeholder="123456789">
                </div>

                <button type="submit" id="submit-btn" name="submit-btn" data-testid="submit-btn" class="btn-primary" disabled="">Submit Profile</button>
            </form>

            <div id="success-message" name="success-message" data-testid="success-message" class="success-message hidden">
                <h3 id="success-heading" data-testid="success-heading">Profile Created Successfully!</h3>
                <p id="success-text" data-testid="success-text">Your unique profile ID:</p>
                <code id="profile-uuid" data-testid="profile-uuid"></code>
            </div>
        </section>
    </main>

    <script src="forms.js"></script>


</body></html>
